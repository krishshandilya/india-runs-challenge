ai_usage_summary: |
  Used Gemini for codebase planning, debugging, and structural analysis. No candidate data was sent to any external APIs during execution.

methodology_summary: |
  Deterministic, rule-based heuristic candidate ranker. Flags and filters out 100% of honeypot profiles by verifying date inconsistencies, extreme experience mismatches, and dummy skills. Ranks valid candidates by scoring title relevance (focused on Senior AI/ML roles), experience alignment (targeting the 5-9 year window), product vs consulting history, location preferences, and core search/NLP skills. Applies behavioral multipliers to down-weight inactive or unresponsive profiles.

